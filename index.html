<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grimoire Mystery - Serpent Circle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
/* ===== CSS CUSTOM PROPERTIES ===== */
:root {
  --deep: #0d0a1a;
  --ink: #1a1428;
  --parchment: #f5edd8;
  --parchment-muted: rgba(245,237,216,0.7);
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --phoenix: #c0392b;
  --phoenix-light: #e74c3c;
  --serpent: #1a6b8a;
  --serpent-light: #2980b9;
  --purple: #6c3d8a;
  --green: #2e7d4f;
  --team-color: #1a6b8a;
  --team-light: #2980b9;
}

/* ===== BASE RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--deep);
  color: var(--parchment);
  font-family: 'Crimson Text', serif;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  user-select: none;
}

/* ===== BACKGROUND GRADIENT ===== */
.bg-gradient {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(108,61,138,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 50%, rgba(26,107,138,0.08) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ===== STARS ===== */
.stars-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.15; }
}
@keyframes starDrift {
  0% { transform: translateY(0) scale(1); opacity: 0.7; }
  100% { transform: translateY(-50px) scale(1.3); opacity: 0.1; }
}
.star.celebrate {
  animation: starDrift var(--dur, 4s) ease-in-out var(--delay, 0s) infinite alternate,
             twinkle 1.5s ease-in-out var(--delay, 0s) infinite;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 60px;
  background: rgba(13,10,26,0.97);
  border-bottom: 1px solid rgba(201,168,76,0.25);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 200;
}
.header.purple-mode { border-bottom-color: rgba(108,61,138,0.4); }

.hdr-team {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1px;
  min-width: 180px;
}
.hdr-station {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  color: var(--parchment);
  text-align: center;
  flex: 1;
  padding: 0 12px;
}
.hdr-station.purple-mode { color: #c5b0e8; }
.hdr-right {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 180px;
  justify-content: flex-end;
}
.pause-btn {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.5);
  color: var(--gold);
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s;
}
.pause-btn:hover { background: rgba(201,168,76,0.12); }
.timer {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--gold);
  min-width: 72px;
  text-align: right;
  line-height: 1;
}
.timer.warning {
  color: var(--phoenix);
  animation: timerPulse 1s ease-in-out infinite;
}
.timer.zero { color: var(--phoenix); }
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ===== PROGRESS BAR ===== */
.progress-wrap {
  position: fixed;
  top: 60px; left: 0; right: 0;
  height: 36px;
  background: rgba(13,10,26,0.95);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 199;
  padding: 0 48px;
}
.progress-wrap.hidden { display: none; }
.progress-track {
  position: relative;
  width: 100%;
  max-width: 560px;
  height: 3px;
  background: rgba(245,237,216,0.08);
  border-radius: 2px;
}
.progress-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--gold);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.progress-dots {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  transform: translateY(-50%);
  display: flex;
  justify-content: space-between;
}
.pdot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--ink);
  border: 2px solid rgba(201,168,76,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  color: rgba(245,237,216,0.4);
  transition: all 0.4s;
}
.pdot.done { background: var(--gold); border-color: var(--gold); color: var(--deep); }
.pdot.cur { background: var(--team-color); border-color: var(--team-color); color: #fff; box-shadow: 0 0 8px var(--team-color); }

/* ===== MAIN WRAPPER ===== */
#screen {
  position: fixed;
  top: 96px; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  z-index: 10;
  transition: opacity 0.4s ease;
}
#screen.fading { opacity: 0; }
#screen.no-progress-bar { top: 60px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--deep); }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.25); border-radius: 3px; }

/* ===== OPENING SCREEN ===== */
.open-screen {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 36px 60px 48px;
  gap: 20px;
}
.crest { font-size: 44px; color: var(--gold); text-shadow: 0 0 24px rgba(201,168,76,0.5); }
.main-title {
  font-family: 'Cinzel', serif;
  font-size: 46px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 5px;
  text-align: center;
  text-shadow: 0 0 40px rgba(201,168,76,0.35);
}
.main-subtitle {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 21px;
  color: var(--parchment-muted);
  text-align: center;
}
.divider { color: var(--gold); font-size: 16px; letter-spacing: 14px; }
.story-scroll {
  background: rgba(245,237,216,0.035);
  border-left: 3px solid var(--gold);
  border-radius: 3px;
  padding: 24px 32px;
  max-width: 700px;
  width: 100%;
}
.story-scroll p {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 16.5px;
  color: var(--parchment);
  line-height: 1.85;
  margin-bottom: 14px;
}
.story-scroll p:last-child { margin-bottom: 0; }
.begin-btn {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 2px;
  background: var(--gold);
  color: var(--deep);
  border: none;
  padding: 15px 48px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 8px;
}
.begin-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

/* ===== STATION SCREEN ===== */
.station-screen {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  padding: 20px 52px 40px;
  gap: 16px;
}

/* Suspect badge */
.suspect-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--gold);
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 5px 14px;
  border-radius: 20px;
  align-self: flex-start;
}
.cleared-badge {
  font-size: 11px;
  color: var(--green);
  background: rgba(46,125,79,0.15);
  border: 1px solid rgba(46,125,79,0.5);
  padding: 2px 8px;
  border-radius: 20px;
}

/* Briefing box */
.briefing-box {
  background: rgba(245,237,216,0.03);
  border-left: 3px solid var(--gold);
  border-radius: 3px;
  padding: 18px 26px;
}
.box-label {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.briefing-box p {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 16.5px;
  color: var(--parchment);
  line-height: 1.8;
}

/* Puzzle box */
.puzzle-box {
  background: rgba(10,8,20,0.55);
  border: 1px dashed rgba(201,168,76,0.4);
  border-radius: 3px;
  padding: 18px 26px;
}
.puzzle-box p {
  font-family: 'Crimson Text', serif;
  font-size: 16.5px;
  color: var(--parchment-muted);
  line-height: 1.8;
}

/* Riddle box (Station 4 - Astronomy Tower) */
.riddle-box {
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 3px;
  padding: 16px 22px;
  margin-top: 14px;
}
.riddle-box p {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 16.5px;
  color: var(--parchment-muted);
  line-height: 1.95;
}
.riddle-box .riddle-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(201,168,76,0.6);
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* Decoder grid (Station 6) */
.decoder-grid {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 18px;
}
.dc-cell {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.45);
  border-radius: 6px;
  padding: 10px 14px;
  text-align: center;
  min-width: 52px;
  box-shadow: 0 0 8px rgba(201,168,76,0.08) inset;
}
.dc-num { display: block; font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold); margin-bottom: 4px; }
.dc-letter { display: block; font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: #f0a832; }

/* Evidence box */
.evidence-box {
  background: rgba(46,125,79,0.07);
  border: 1px solid rgba(46,125,79,0.5);
  border-radius: 3px;
  padding: 0 26px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.7s ease, opacity 0.6s ease, padding 0.4s ease;
}
.evidence-box.revealed {
  max-height: 500px;
  opacity: 1;
  padding: 18px 26px;
}
.evidence-box.critical {
  background: rgba(201,168,76,0.06);
  border-color: rgba(201,168,76,0.6);
  box-shadow: 0 0 24px rgba(201,168,76,0.12);
}
.evidence-box .box-label { color: var(--green); }
.evidence-box.critical .box-label { color: var(--gold); }
.evidence-box p {
  font-family: 'Crimson Text', serif;
  font-size: 16px;
  color: var(--parchment-muted);
  line-height: 1.8;
  margin-bottom: 10px;
}
.evidence-box p:last-child { margin-bottom: 0; }
.souvenir-tag {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--green);
  background: rgba(46,125,79,0.15);
  border: 1px solid rgba(46,125,79,0.4);
  padding: 4px 12px;
  border-radius: 3px;
  margin-top: 6px;
}

/* ===== CODEWORD INPUT ===== */
.codeword-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 20px 0 12px;
}
.codeword-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
.codeword-row { display: flex; gap: 10px; align-items: center; }
.codeword-input {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 5px;
  text-transform: uppercase;
  background: rgba(13,10,26,0.85);
  border: 2px solid var(--gold);
  color: var(--parchment);
  padding: 11px 22px;
  border-radius: 4px;
  text-align: center;
  width: 280px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.codeword-input:focus { border-color: var(--gold-light); box-shadow: 0 0 14px rgba(201,168,76,0.18); }
.codeword-input.error { border-color: var(--phoenix) !important; animation: shake 0.45s ease; box-shadow: none !important; }
.codeword-input.success { border-color: var(--gold-light) !important; box-shadow: 0 0 22px rgba(201,168,76,0.5), 0 0 48px rgba(201,168,76,0.18) !important; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-9px); }
  35% { transform: translateX(9px); }
  55% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.submit-btn {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  background: var(--team-color);
  color: var(--gold);
  border: none;
  padding: 13px 26px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
}
.submit-btn:hover { background: var(--team-light); transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
.feedback-msg {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 1px;
  text-align: center;
  min-height: 18px;
}
.feedback-msg.ok { color: var(--gold); }
.feedback-msg.err { color: var(--phoenix-light); }

/* ===== ADVANCE BUTTON ===== */
.advance-btn {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  background: var(--gold);
  color: var(--deep);
  border: none;
  padding: 14px 40px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
  margin: 14px auto 0;
}
.advance-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }
.advance-btn.hidden { display: none; }

/* ===== FINALE SCREENS ===== */
.finale-screen {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 52px 48px;
  gap: 22px;
}
.step-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(245,237,216,0.35);
  text-transform: uppercase;
}
.finale-heading {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  letter-spacing: 3px;
}
.suspect-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 480px; }
.suspect-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 18px;
  background: rgba(245,237,216,0.025);
  border: 1px solid rgba(245,237,216,0.08);
  border-radius: 4px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  color: var(--parchment);
}
.status-cleared { color: var(--green); font-size: 12px; }
.status-unknown { color: var(--gold); font-size: 20px; }

.accuse-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
.accuse-input {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: rgba(13,10,26,0.85);
  border: 2px solid rgba(201,168,76,0.4);
  color: var(--parchment);
  padding: 11px 22px;
  border-radius: 4px;
  text-align: center;
  width: 100%;
  max-width: 380px;
  outline: none;
  transition: border-color 0.3s;
}
.accuse-input:focus { border-color: var(--gold); }
.accuse-input.error { border-color: var(--phoenix) !important; animation: shake 0.45s ease; }
.accuse-btn {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  background: var(--phoenix);
  color: #fff;
  border: none;
  padding: 13px 40px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
}
.accuse-btn:hover { background: var(--phoenix-light); }

/* Reveal step */
.reveal-bg { animation: revealPulse 4s ease-in-out infinite; }
@keyframes revealPulse {
  0%,100% { background: rgba(13,10,26,0); }
  50% { background: rgba(201,168,76,0.025); }
}
.evidence-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; }
.ev-card {
  flex: 1;
  min-width: 200px;
  max-width: 260px;
  background: rgba(245,237,216,0.03);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  padding: 18px;
}
.ev-card-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
  display: block;
}
.ev-card p {
  font-family: 'Crimson Text', serif;
  font-size: 14.5px;
  color: var(--parchment-muted);
  line-height: 1.7;
}
.motive-box {
  background: rgba(245,237,216,0.025);
  border-left: 3px solid var(--gold);
  padding: 18px 26px;
  max-width: 660px;
  width: 100%;
  border-radius: 0 3px 3px 0;
}
.motive-box p {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 16.5px;
  color: var(--parchment);
  line-height: 1.85;
  margin-bottom: 12px;
}
.motive-box p:last-child { margin-bottom: 0; }
.justice { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); letter-spacing: 4px; }

/* Envelope */
.envelope {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 28px 44px;
  border: 2px solid var(--gold);
  border-radius: 6px;
  background: rgba(201,168,76,0.04);
  box-shadow: 0 0 30px rgba(201,168,76,0.1);
}
.envelope .env-icon { font-size: 48px; }
.envelope .env-label { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); letter-spacing: 4px; }

/* Parchment letter */
.parchment-letter {
  background: rgba(245,237,216,0.06);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 4px;
  padding: 28px 36px;
  max-width: 580px;
  width: 100%;
  box-shadow: 0 0 40px rgba(201,168,76,0.06) inset;
}
.parchment-letter p {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: 17.5px;
  color: var(--parchment);
  line-height: 1.95;
  margin-bottom: 14px;
}
.parchment-letter p:last-child { margin-bottom: 0; }

/* Incantation */
.incantation-box {
  background: rgba(13,10,26,0.8);
  border: 2px solid var(--gold);
  border-radius: 6px;
  padding: 28px 44px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 24px rgba(201,168,76,0.12);
}
.incantation-box p {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  color: var(--gold);
  line-height: 2.3;
  letter-spacing: 2px;
}
.incant-big { font-size: 30px !important; font-weight: 700; letter-spacing: 6px !important; }

/* Celebration */
.celebration-title {
  font-family: 'Cinzel', serif;
  font-size: 40px;
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  letter-spacing: 4px;
  animation: celebPulse 2.2s ease-in-out infinite;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
}
@keyframes celebPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
.cert-badges { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.cert-badge {
  border: 2px solid var(--gold);
  border-radius: 6px;
  padding: 22px 28px;
  max-width: 310px;
  text-align: center;
  background: rgba(201,168,76,0.04);
}
.cert-title { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }

// ===== TIMER =====
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerRunning = true;
  state.isPaused = false;
  state.timerInterval = setInterval(tickTimer, 1000);
  renderTimer();
}
function tickTimer() {
  if (state.timeRemaining > 0) { state.timeRemaining--; }
  renderTimer();
  if (state.timeRemaining === 0) { clearInterval(state.timerInterval); state.timerRunning = false; }
}
function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
}
function resetTimer() {
  stopTimer();
  state.timeRemaining = 300;
  state.isPaused = false;
  const btn = document.getElementById('pauseBtn');
  if (btn) btn.textContent = 'PAUSE';
  renderTimer();
}
function renderTimer() {
  const el = document.getElementById('timer');
  if (!el) return;
  const m = Math.floor(state.timeRemaining / 60);
  const s = state.timeRemaining % 60;
  el.textContent = `${m}:${String(s).padStart(2, '0')}`;
  el.className = 'timer';
  if (state.timeRemaining === 0) el.classList.add('zero');
  else if (state.timeRemaining < 60) el.classList.add('warning');
}
function togglePause() {
  const btn = document.getElementById('pauseBtn');
  if (state.isPaused) {
    state.isPaused = false;
    startTimer();
    if (btn) btn.textContent = 'PAUSE';
  } else {
    state.isPaused = true;
    stopTimer();
    if (btn) btn.textContent = 'RESUME';
  }
}

// ===== PROGRESS BAR =====
function updateProgress(stationId) {
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const dots = document.getElementById('progressDots');
  if (stationId === 0) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  const pct = ((stationId - 1) / 6) * 100;
  fill.style.width = pct + '%';
  dots.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < stationId ? ' done' : i === stationId ? ' cur' : '');
    d.textContent = i;
    dots.appendChild(d);
  }
}

// ===== TRANSITION =====
function transition(fn) {
  const sc = document.getElementById('screen');
  sc.classList.add('fading');
  setTimeout(() => { fn(); sc.classList.remove('fading'); }, 420);
}

// ===== STARS =====
function makeStars() {
  const c = document.getElementById('starsContainer');
  for (let i = 0; i < 52; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.4 + 0.6;
    const dur = (Math.random() * 4 + 1.8).toFixed(1);
    const delay = (Math.random() * 5).toFixed(1);
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${dur}s;--delay:${delay}s;animation-delay:${delay}s;opacity:${(Math.random()*0.5+0.2).toFixed(2)}`;
    c.appendChild(s);
  }
}

// ===== OPENING SCREEN =====
function showOpening() {
  state.currentStation = 0;
  updateProgress(0);
  const sc = document.getElementById('screen');
  sc.className = 'no-progress-bar';
  document.getElementById('mainHeader').className = 'header';
  document.getElementById('hdrStation').className = 'hdr-station';
  document.getElementById('hdrStation').textContent = 'The Grimoire Mystery';
  document.getElementById('timer').textContent = '5:00';
  document.getElementById('pauseBtn').classList.add('hidden');
  sc.innerHTML = `
    <div class="open-screen">
      <div class="crest">✦</div>
      <h1 class="main-title">THE GRIMOIRE MYSTERY</h1>
      <p class="main-subtitle"><em>Meera's 9th Birthday · A Magical Murder Mystery</em></p>
      <div class="divider">✦ ✦ ✦</div>
      <div class="story-scroll">
        <p>Welcome, young witches, to the Wyldmoor School of Enchantment.</p>
        <p>Today should have been the most magical day of the year - the birthday of our most gifted student, Meera. But something terrible has happened.</p>
        <p>This morning, at the stroke of dawn, Jasper - the school's beloved caretaker, who had looked after Wyldmoor for forty years - was found dead. He was lying in the corridor outside the Grimoire vault. The vault door was open. And the Ancient Grimoire of Wonders - the most powerful book in existence - was gone.</p>
        <p>Jasper was the only one who knew the vault's secret password. Which means whoever killed him... made him talk first.</p>

      </div>
      <button class="begin-btn" onclick="beginGame()">BEGIN INVESTIGATION →</button>
    </div>`;
}

// ===== BEGIN GAME =====
function beginGame() {
  transition(() => {
    document.getElementById('pauseBtn').classList.remove('hidden');
    showStation(0);
    resetTimer();
    startTimer();
  });
}

// ===== SHOW STATION =====
function showStation(idx) {
  const s = stations[idx];
  state.currentStation = s.id;
  updateProgress(s.id);
  const sc = document.getElementById('screen');
  sc.className = '';
  const hdr = document.getElementById('mainHeader');
  const hdrSt = document.getElementById('hdrStation');

  if (s.isShared) {
    hdr.className = 'header purple-mode';
    hdrSt.className = 'hdr-station purple-mode';
    hdrSt.textContent = s.name;
  } else if (s.isFinale) {
    hdr.className = 'header';
    hdrSt.className = 'hdr-station';
    hdrSt.textContent = '⚡ The Grimoire Chamber · Final Quest';
    showFinale();
    return;
  } else {
    hdr.className = 'header';
    hdrSt.className = 'hdr-station';
    hdrSt.textContent = s.name;
  }

  // Suspect badge
  let badgeHtml = '';
  if (s.suspect) {
    const clearedHtml = s.cleared ? '<span class="cleared-badge">✓ CLEARED</span>' : '';
    badgeHtml = `<div class="suspect-badge">${s.suspect}${clearedHtml}</div>`;
  } else if (s.isShared) {
    badgeHtml = `<div class="suspect-badge" style="border-color:rgba(108,61,138,0.5);color:#c5b0e8;background:rgba(108,61,138,0.08);">⚡ BOTH HOUSES COMPETE</div>`;
  }

  // Riddle box (station 4)
  let riddleHtml = '';
  if (s.showRiddle) {
    const lines = s.riddle.split('\n').join('<br>');
    riddleHtml = `<div class="riddle-box"><div class="riddle-label">The Scroll's Riddle</div><p>${lines}</p></div>`;
  }

  // Decoder table (station 6)
  let decoderHtml = '';
  if (s.showDecoder) {
    const entries = [{n:24,l:'?'}];
    decoderHtml = '<div class="decoder-grid">' + entries.map(e=>`<div class="dc-cell"><span class="dc-num">${e.n}</span><span class="dc-letter">${e.l}</span></div>`).join('') + '</div>';
  }

  // Advance button (station 6 only)
  const advHtml = s.manualAdvance
    ? `<button class="advance-btn hidden" id="advBtn" onclick="nextStation(${idx})">→ ADVANCE TO FINAL CHAMBER</button>`
    : '';

  sc.innerHTML = `
    <div class="station-screen">
      ${badgeHtml}
      <div class="briefing-box">
        <div class="box-label">Mission Briefing</div>
        <p>${s.briefing}</p>
      </div>
      <div class="puzzle-box">
        <div class="box-label">Puzzle Instructions</div>
        <p>${s.puzzle}</p>
        ${riddleHtml}
        ${decoderHtml}
      </div>
      <div class="evidence-box ${s.critical ? 'critical' : ''}" id="evidenceBox">
        <div class="box-label">${s.evidenceTitle}</div>
        <p>${s.evidenceText.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</p>
        ${s.souvenir ? `<div class="souvenir-tag">${s.souvenir}</div>` : ''}
        ${advHtml}
      </div>
      <div class="codeword-section">
        <div class="codeword-label">Enter the Codeword</div>
        <div class="codeword-row">
          <input class="codeword-input" id="cwInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
            placeholder="- - - - -"
            onkeydown="if(event.key==='Enter')checkCW(${idx})">
          <button class="submit-btn" id="submitBtn" onclick="checkCW(${idx})">SUBMIT</button>
        </div>
        <div class="feedback-msg" id="feedMsg"></div>
      </div>
    </div>`;

  setTimeout(() => { const i = document.getElementById('cwInput'); if(i) i.focus(); }, 80);
}

// ===== CHECK CODEWORD =====
function checkCW(idx) {
  const input = document.getElementById('cwInput');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('feedMsg');
  if (!input || input.disabled) return;

  const entered = input.value.trim().toUpperCase();
  const correct = stations[idx].codeword.toUpperCase();

  if (entered === correct) {
    // --- CORRECT ---
    input.classList.add('success');
    input.disabled = true;
    if (btn) btn.disabled = true;
    msg.className = 'feedback-msg ok';
    msg.textContent = '✦ Correct! The seal is broken...';
    stopTimer();

    setTimeout(() => {
      const eb = document.getElementById('evidenceBox');
      if (eb) eb.classList.add('revealed');
      const adv = document.getElementById('advBtn');
      if (adv) adv.classList.remove('hidden');

      if (!stations[idx].manualAdvance) {
        msg.textContent = '✦ Evidence revealed! Moving to next station...';
        setTimeout(() => nextStation(idx), 3200);
      } else {
        msg.textContent = '✦ Evidence revealed! Advance when ready.';
      }
    }, 900);

  } else {
    // --- WRONG ---
    input.classList.add('error');
    msg.className = 'feedback-msg err';
    msg.textContent = 'The magic did not respond. Try again.';
    setTimeout(() => {
      input.classList.remove('error');
      input.value = '';
      input.focus();
    }, 550);
    setTimeout(() => { msg.textContent = ''; }, 2100);
  }
}

// ===== NEXT STATION =====
function nextStation(idx) {
  const next = idx + 1;
  if (next >= stations.length) return;
  transition(() => {
    resetTimer();
    showStation(next);
    if (!stations[next].isFinale) startTimer();
  });
}

// =====================================================================
// FINALE SYSTEM - 6 steps (identical to Phoenix)

function showFinale() {
  stopTimer();
  document.getElementById('timer').textContent = '';
  document.getElementById('pauseBtn').classList.add('hidden');
  state.finaleStep = 1;
  renderFinaleStep(1);
}

function goFinaleStep(n) {
  transition(() => renderFinaleStep(n));
}

  } else if (step === 5) {
    // --- STEP 5: THE INCANTATION ---
    sc.innerHTML = `
      <div class="finale-screen">
        <div class="step-label">Step 5 of 6 - The Incantation</div>

          <p>I open this Grimoire for Jasper's sake -</p>
          <p class="incant-big">GRIMOIRE!</p>
        </div>
        <p class="text-parchment text-italic">Meera - say these words aloud. Then open the book.</p>
        <button class="continue-btn" onclick="goFinaleStep(6)">The Grimoire is open! →</button>
      </div>`;

  } else if (step === 6) {
    // --- STEP 6: CELEBRATION ---
    document.querySelectorAll('.star').forEach(s => s.classList.add('celebrate'));
    sc.innerHTML = `
      <div class="finale-screen" style="gap:24px;">
        <div class="step-label">Step 6 of 6 - Celebration</div>
        <h1 class="celebration-title">✦ Happy Birthday, Meera! ✦</h1>
        <p class="text-parchment-large text-italic">Jasper is avenged. The school's magic is restored.</p>
        <div class="cert-badges">
          <div class="cert-badge">
            <div class="cert-title">🔴 PHOENIX ORDER</div>
            <div class="cert-body"><em>Wizard Investigators of Wyldmoor</em><br>You solved The Grimoire Mystery<br><br>Stations visited:<br>Astronomy Tower · Herbology Grounds<br>Potions Dungeon · Transfiguration Hall<br>Divination Market · Illumination Chamber<br>The Grimoire Chamber</div>
          </div>
          <div class="cert-badge">
            <div class="cert-title">🔵 SERPENT CIRCLE</div>
            <div class="cert-body"><em>Wizard Investigators of Wyldmoor</em><br>You solved The Grimoire Mystery<br><br>Stations visited:<br>Potions Dungeon · Transfiguration Hall<br>Divination Market · Astronomy Tower<br>Herbology Grounds · Illumination Chamber<br>The Grimoire Chamber</div>
          </div>
        </div>
        <div style="text-align:center;max-width:580px;">
          <p style="font-family:'Crimson Text',serif;font-style:italic;font-size:18px;color:var(--parchment);line-height:1.95;">
            Jasper watched over Wyldmoor for forty years. Today, you gave him justice.<br>
            The Grimoire is home. The magic lives on.<br>
            <strong style="font-family:'Cinzel',serif;color:var(--gold);font-size:19px;letter-spacing:3px;">Well done, detectives. Well done.</strong>
          </p>
        </div>
      </div>`;
  }
}

// ===== SUBMIT ACCUSATION =====
function submitAccuse() {
  const input = document.getElementById('accuseInput');
  const msg = document.getElementById('accuseMsg');
  if (!input || input.disabled) return;
  const val = input.value.trim().toUpperCase().replace(/\s+/g,' ');
  if (val === 'THE ARCHIVIST' || val === 'ARCHIVIST') {
    input.disabled = true;
    msg.className = 'feedback-msg ok';
    msg.textContent = '⚡ The evidence is undeniable...';
    setTimeout(() => goFinaleStep(2), 1200);
  } else {
    input.classList.add('error');
    msg.className = 'feedback-msg err';
    msg.textContent = 'The evidence does not support this accusation. Review your clues.';
    setTimeout(() => { input.classList.remove('error'); input.value = ''; input.focus(); }, 550);
  }
}

// ===== INIT =====
window.addEventListener('load', () => {
  makeStars();
  showOpening();
});
